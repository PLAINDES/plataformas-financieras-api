version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: financiera_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DATABASE_NAME:-financiera_db}
      MYSQL_USER: ${DATABASE_USER:-financiera_user}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-financiera_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      interval: 10s
    networks:
      - financiera_network

  backend:
    build: .
    container_name: financiera_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_USER: ${DATABASE_USER:-financiera_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-financiera_password}
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_NAME: ${DATABASE_NAME:-financiera_db}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@example.com}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-changeme}
      DEBUG: ${DEBUG:-False}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-'["http://localhost:5173","http://localhost:3000","http://localhost"]'}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    #Desarrollo
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
 
    networks:
      - financiera_network
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      timeout: 10s
      retries: 5
      interval: 10s
      start_period: 30s

volumes:
  mysql_data:
    driver: local

networks:
  financiera_network:
    driver: bridge
